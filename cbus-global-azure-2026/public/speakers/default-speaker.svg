<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="Speaker photo not yet available">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="55%" stop-color="#bfdbfe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <linearGradient id="figure" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- Silhouette: head + neck + upper body -->
  <g fill="url(#figure)">
    <!-- Head -->
    <circle cx="200" cy="183" r="78"/>
    <!-- Neck -->
    <rect x="169" y="254" width="62" height="68" rx="6"/>
    <!-- Shoulders / upper body (ellipse cropped by viewBox) -->
    <ellipse cx="200" cy="468" rx="192" ry="158"/>
  </g>
</svg>
